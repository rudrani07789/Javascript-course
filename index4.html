<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121; color: #ffff;">
    <ul class="Language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLanageue(langName){
        const li=document.createElement("li")
        li.innerHTML=`${langName}`
        document.querySelector('.Language').appendChild(li)
    }
    addLanageue("python")
    addLanageue("Typescript")

    function addOptLang(langName){
        const li=document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.Language').appendChild(li)
    }
    addOptLang("golang")

    //Edit 
    const secLnag=document.querySelector("li:nth-child(2)")
    //secLnag.innerHTML="Mojo"
    const newli=document.createElement('li')
    newli.textContent="Java"
    secLnag.replaceWith(newli)

    //edit
    const firstlang=document.querySelector("li:first-child")
    firstlang.outerHTML='<li>Typescript</li>'

    //remove
    const lastlang=document.querySelector('li:last-child')
    lastlang.remove()
</script>
</html>
